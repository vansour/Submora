[build]
# 禁用 sqlx 的 MySQL 和 PostgreSQL 功能，避免引入 rsa 依赖
[env]
SQLX_OFFLINE = "true"
SQLX_MYSQL = "false"
SQLX_POSTGRES = "false"

[target.wasm32-unknown-unknown]
# Dioxus 0.7.3 currently runs wasm-opt after wasm-bindgen in release web builds.
# Stripping DWARF here avoids a wasm-opt/Binaryen crash on recent Rust/LLVM output.
rustflags = ["-C", "strip=debuginfo"]
